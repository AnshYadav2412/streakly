<svg width="160" height="160" viewBox="0 0 160 160" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Streakly icon</title>
  <desc>A flame-like streak icon made of five ascending rounded bars in amber and orange tones</desc>

  <!-- Icon: 5 ascending bars like a streak/flame, pill-shaped -->
  <!-- bar 1 - shortest, dimmest amber -->
  <rect x="10" y="110" width="22" height="36" rx="11" fill="#fcd34d"/>
  <!-- bar 2 -->
  <rect x="40" y="93" width="22" height="53" rx="11" fill="#fbbf24"/>
  <!-- bar 3 -->
  <rect x="70" y="73" width="22" height="73" rx="11" fill="#f59e0b"/>
  <!-- bar 4 -->
  <rect x="100" y="51" width="22" height="95" rx="11" fill="#ea8c00"/>
  <!-- bar 5 - tallest, deepest orange -->
  <rect x="130" y="26" width="22" height="120" rx="11" fill="#d97706"/>

  <!-- Flame tip dot on tallest bar -->
  <circle cx="141" cy="16" r="9" fill="#f97316"/>
  <circle cx="141" cy="16" r="5" fill="#fb923c"/>
</svg>
